spring.application.name=authentication

server.port=${PORT:8080}

# ===== IMPORTANT: Add these proxy/forwarded headers config =====
# Tell Spring to trust forwarded headers from Render's proxy
server.forward-headers-strategy=framework
server.use-forward-headers=true

# Ensure no context path is set (must be empty)
server.servlet.context-path=

# Tomcat's remote IP valve configuration
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
# ==============================================================

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Email - Brevo SMTP Configuration
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Trust the SSL certificate
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
# Add timeouts to prevent hanging
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Cookie Configuration
cookie.secure=${COOKIE_SECURE:false}
cookie.same-site=${COOKIE_SAME_SITE:Strict}
cookie.refresh-token-max-age=${COOKIE_REFRESH_TOKEN_MAX_AGE:604800}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# ===== FIXED: Email From Configuration =====
# Option 1: Use separate simple email address (RECOMMENDED)
mail.from.address=${MAIL_FROM:noreply@rockrager.com}
mail.from.name=RockRager Authentication

# Option 2: Or just use the SMTP username (simplest)
# mail.from.address=${spring.mail.username}
# mail.from.name=
# ============================================

# App
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Add this to help debug email issues (set to false in production)
mail.debug=${MAIL_DEBUG:false}
mail.html.enabled=true