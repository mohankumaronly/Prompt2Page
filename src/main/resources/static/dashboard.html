<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .success { color: #4CAF50; font-size: 48px; margin-bottom: 20px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #5a67d8; }
        .info { margin-top: 20px; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="success">✓</div>
    <h1>Login Successful!</h1>
    <p>You are now logged in with Google.</p>

    <div class="info">
        <p>Tokens are stored in HTTP-only cookies for security.</p>
        <p>You can now make authenticated API requests.</p>
    </div>

    <button onclick="testApi()">Test API Call</button>
    <button onclick="logout()">Logout</button>

    <div id="result" style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; display: none;"></div>
</div>

<script>
    async function testApi() {
        try {
            const response = await fetch('/api/auth/me', {
                method: 'GET',
                credentials: 'include'  // Important: sends cookies
            });
            const data = await response.json();
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').innerHTML = '<strong>API Response:</strong><br>' + JSON.stringify(data, null, 2);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function logout() {
        try {
            const response = await fetch('/api/auth/logout', {
                method: 'POST',
                credentials: 'include'
            });
            window.location.href = '/';
        } catch (error) {
            console.error('Error:', error);
        }
    }
</script>
</body>
</html>
